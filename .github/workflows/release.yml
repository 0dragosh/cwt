name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@cwt.dev"
          git config --global user.name "cwt-ci"

      - name: cargo test
        run: cargo test --all-targets

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          cargo_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $cargo_version"
            exit 1
          fi

      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [ci, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag
          prev_tag="$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')"
          if [ -z "$prev_tag" ]; then
            # First release — log everything
            changelog="$(git log --oneline --no-decorate)"
          else
            changelog="$(git log --oneline --no-decorate "${prev_tag}..HEAD")"
          fi
          # Write to file to avoid delimiter issues
          echo "$changelog" > /tmp/changelog.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file /tmp/changelog.txt
