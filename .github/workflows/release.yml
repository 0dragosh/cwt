name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute effective tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: CI Gate
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@cwt.dev"
          git config --global user.name "cwt-ci"

      - name: cargo test
        run: cargo test --all-targets

  publish:
    name: Publish to crates.io
    needs: [resolve-tag, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Verify tag matches Cargo.toml version
        env:
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          tag="${TAG#v}"
          cargo_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $cargo_version"
            exit 1
          fi

      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [resolve-tag, ci, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          # Find the previous tag
          prev_tag="$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')"
          if [ -z "$prev_tag" ]; then
            # First release — log everything
            changelog="$(git log --oneline --no-decorate)"
          else
            changelog="$(git log --oneline --no-decorate "${prev_tag}..${TAG}")"
          fi
          # Write to file to avoid delimiter issues
          echo "$changelog" > /tmp/changelog.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/changelog.txt
